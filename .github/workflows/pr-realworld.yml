name: RealWorld PR Validation

on:
  pull_request:
  push:
    branches:
      - main
      - feat/**

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install app dependencies
        run: npm run install:apps

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps  

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: RealWorld validation specs
        run: npm run validate:realworld

      - name: Chromium baseline corpus
        run: |
          PLAYWRIGHT_BROWSERS=chromium npm run benchmark:baseline:all

      - name: Prepare deterministic mutation samples
        run: |
          npm run benchmark:prepare:app --appid=angular-realworld-example-app --budget=1 --seed=12345
          npm run benchmark:prepare:app --appid=realworld --budget=1 --seed=12345
          npm run benchmark:prepare:app --appid=vue3-realworld-example-app --budget=1 --seed=12345

      - name: Chromium mutation sample
        run: npm run benchmark:mutate:sample:all

      - name: Aggregate reports
        run: npm run benchmark:aggregate:all

      - name: Reports freshness
        run: npm run reports:check

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: realworld-pr-artifacts
          path: |
            reports
            test-results
