name: RealWorld Scheduled Smoke

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install app dependencies
        run: npm run install:apps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Validation specs
        run: npm run validate:realworld

      - name: Cross-browser baseline smoke
        run: npm run benchmark:baseline:smoke:all

      - name: Prepare mutation samples
        run: |
          npm run benchmark:prepare:app --appid=angular-realworld-example-app --budget=1 --seed=12345
          npm run benchmark:prepare:app --appid=realworld --budget=1 --seed=12345
          npm run benchmark:prepare:app --appid=vue3-realworld-example-app --budget=1 --seed=12345

      - name: Chromium mutation sample
        run: npm run benchmark:mutate:sample:all

      - name: Aggregate reports
        run: npm run benchmark:aggregate:all

      - name: Generate machine-readable reports
        run: npm run reports:generate

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: realworld-scheduled-artifacts
          path: |
            reports
            test-results
