<div class="editor-page" data-testid="editor-page">
  <div class="container page">
    <div class="row">
      <div class="col-md-10 offset-md-1 col-xs-12">
        <app-list-errors [errors]="errors()" data-testid="editor-error-list" />

        <form [formGroup]="articleForm" data-testid="editor-form">
          <fieldset [disabled]="isSubmitting()" data-testid="editor-fieldset">
            <fieldset class="form-group" data-testid="editor-title-fieldset">
              <input
                class="form-control form-control-lg"
                formControlName="title"
                name="title"
                type="text"
                placeholder="Article Title"
                data-testid="editor-title-input"
              />
            </fieldset>

            <fieldset class="form-group" data-testid="editor-description-fieldset">
              <input
                class="form-control"
                formControlName="description"
                name="description"
                type="text"
                placeholder="What's this article about?"
                data-testid="editor-description-input"
              />
            </fieldset>

            <fieldset class="form-group" data-testid="editor-body-fieldset">
              <textarea
                class="form-control"
                formControlName="body"
                name="body"
                rows="8"
                placeholder="Write your article (in markdown)"
                data-testid="editor-body-textarea"
              >
              </textarea>
            </fieldset>

            <fieldset class="form-group" data-testid="editor-tags-fieldset">
              <input
                class="form-control"
                type="text"
                placeholder="Enter tags"
                [formControl]="tagField"
                (keyup.enter)="addTag()"
                data-testid="editor-tag-input"
              />
              <div class="tag-list" data-testid="editor-tag-list">
                @for (tag of tagList(); track tag) {
                  <span class="tag-default tag-pill" data-testid="editor-tag-item">
                    <i class="ion-close-round" (click)="removeTag(tag)" data-testid="editor-tag-remove"></i>
                    {{ tag }}
                  </span>
                }
              </div>
            </fieldset>

            <button class="btn btn-lg pull-xs-right btn-primary" type="button" (click)="submitForm()" data-testid="editor-submit-button">
              Publish Article
            </button>
          </fieldset>
        </form>
      </div>
    </div>
  </div>
</div>
